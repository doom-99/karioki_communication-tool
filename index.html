<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>総合コミュニケーション支援ツール</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>
    <div id="nameEntryOverlay" class="name-entry-overlay">
        <div class="name-entry-card">
            <h2>👋 はじめに</h2>
            <p>会話に参加するための名前を入力してください．．<br><small>（ニックネームでOKです）</small></p>
            <input type="text" id="initialNameInput" placeholder="例：A先生，太郎...">
            <button id="entryBtn">会話を始める</button>
        </div>
    </div>

    <div class="header">
        <button id="mobileMenuBtn" class="mobile-menu-btn">☰ 通信設定</button>
        
        <h1>会話ノート</h1>
        <div>
            <button id="settingsBtn" class="settings-link-btn">⚙️ 設定・辞書</button>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="drawerOverlay" class="drawer-overlay"></div>
        
        <details class="sync-panel" id="syncPanel">
            <summary class="sync-summary">
                📡 通信・招待機能を開く 
                <span id="syncStatusSummary">（オフライン）</span>
            </summary>
            <div class="sync-content">
                <div class="my-id-area">
                    <div class="label">あなたのID：</div>
                    <div id="myPeerId" class="sync-id">取得中...</div>
                    <div class="btn-group">
                        <button id="copyUrlBtn" class="invite-btn" style="display:none;">🔗 URLコピー</button>
                        <button id="showQrBtn" class="invite-btn" style="display:none;">📱 QRコード表示</button>
                    </div>
                </div>

                <div class="connect-area">
                    <input type="text" id="myNameInput" placeholder="あなたの名前">
                    <input type="text" id="targetPeerId" placeholder="相手のIDを入力">
                    <button id="connectBtn">接続する</button>
                </div>
                
                <div id="syncStatus" class="status-text">現在オフラインです</div>
                
                <div id="qrContainer">
                    <div class="qr-label">相手のカメラで読み取ってください</div>
                    <div id="qrcode"></div>
                </div>
            </div>
        </details>

        <div class="chat-container">
            <div class="chat-header">
                <div class="header-right" style="width: 100%; justify-content: flex-end;">
                    <button id="copyChatBtn" class="action-btn">📋 コピー </button>
                    <button id="downloadChatBtn" class="action-btn">💾 保存 </button>
                    <button id="clearChatBtn" class="clear-btn">🗑️ リセット </button>
                </div>
            </div>

            <div id="envSoundCaption" class="caption-bar"></div>
            <div id="typingIndicator" class="typing-indicator"></div>
            <div id="selectionPopup">📖 辞書に登録</div>
            
            <div id="chatLog" class="chat-textarea" data-placeholder="ここに会話の履歴が表示されます..."></div>
            <div id="sttInterim"></div>

            <div class="meter-container">
                <span class="meter-label">🎤 マイク入力：</span>
                <div class="meter-bar-bg"><div id="volumeMeter" class="meter-bar-fill"></div></div>
            </div>

            <div class="input-row">
                <button id="startBtn" class="action-icon-btn" aria-label="聞き取り開始">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8.25 4.5a3.75 3.75 0 1 1 7.5 0v8.25a3.75 3.75 0 1 1-7.5 0V4.5Z" />
                            <path d="M6 10.5a.75.75 0 0 1 .75.75 5.25 5.25 0 1 0 10.5 0 .75.75 0 0 1 1.5 0 6.75 6.75 0 0 1-6 6.709V21h3a.75.75 0 0 1 0 1.5h-7.5a.75.75 0 0 1 0-1.5h3v-3.791a6.75 6.75 0 0 1-6-6.709A.75.75 0 0 1 6 10.5Z" />
                        </svg>
                    </span>
                    <span class="text">聞き取り</span>
                </button>

                <button id="waitBtn" class="wait-btn action-icon-btn" aria-label="待って">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path fill-rule="evenodd" d="M12 2.25c-1.151 0-2.1.867-2.23 2.011L9.28 8.18a.75.75 0 0 1-1.492-.12l.49-4.583c.13-1.226 1.157-2.127 2.387-2.127H12a2.625 2.625 0 0 1 2.625 2.625v4.54a.75.75 0 0 1-1.5 0V4.875A1.125 1.125 0 0 0 12 3.75ZM8.545 9.405l-.49 4.583c-.13 1.226-1.157 2.127-2.387 2.127H5.25a2.625 2.625 0 0 1-2.625-2.625v-4.54a.75.75 0 0 1 1.5 0v4.54c0 .621.504 1.125 1.125 1.125h.418c.547 0 1.004-.403 1.062-.947l.49-4.583a.75.75 0 0 1 1.492.12l-.167 1.563a.75.75 0 1 1-1.492-.12l.167-1.563ZM15.455 9.405l.49 4.583c.13 1.226 1.157 2.127 2.387 2.127h.418a2.625 2.625 0 0 0 2.625-2.625v-4.54a.75.75 0 0 0-1.5 0v4.54c0 .621-.504 1.125-1.125 1.125h-.418a1.125 1.125 0 0 1-1.062-.947l-.49-4.583a.75.75 0 0 0-1.492.12l.167 1.563a.75.75 0 1 0 1.492.12l-.167-1.563ZM12 21.75a8.25 8.25 0 0 0 8.25-8.25.75.75 0 0 1 1.5 0A9.75 9.75 0 0 1 12 23.25a9.75 9.75 0 0 1-9.75-9.75.75.75 0 0 1 1.5 0 8.25 8.25 0 0 0 8.25 8.25Z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    <span class="text">待って</span>
                </button>

                <textarea id="ttsInput" rows="1" placeholder="返答を入力（Enterで送信）"></textarea>
                
                <button id="speakBtn" class="action-icon-btn" aria-label="送信">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width: 1.2em; height: 1.2em; vertical-align: -0.1em;">
                            <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
                        </svg>
                    </span>
                    <span class="text"> 送信 </span>
                </button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content settings-container">
            <div class="modal-header">
                <h2>⚙️ 設定・辞書</h2>
                <button id="closeSettingsBtn" class="close-icon-btn">✖</button>
            </div>
            <div id="saveToast">✅ 設定を保存しました</div>

            <div class="section-title">便利機能</div>
            <div class="settings-grid">
                <div class="settings-item">
                    <label>🔔 環境音AI（周囲の音を文字化）</label>
                    <label class="env-toggle" style="display: inline-flex;">
                        <input type="checkbox" id="envSoundToggle"> 環境音の監視をオンにする
                    </label>
                </div>
            </div>
            
            <div class="section-title">文字と音声の調整</div>
            <div class="settings-grid">
                <div class="settings-item">
                    <label>🔠 アプリの文字サイズ</label>
                    <div class="font-controls">
                        <button class="font-btn" id="fontIncreaseBtn">＋ 大きくする</button>
                        <button class="font-btn" id="fontDecreaseBtn">－ 小さくする</button>
                        <span class="font-status">現在のサイズ: <span id="currentFontSizeDisplay">16</span>px</span>
                    </div>
                </div>
                <div class="settings-item">
                    <label>🌙 ダークモード（ナイトモード）</label>
                    <label class="env-toggle" style="display: inline-flex;">
                        <input type="checkbox" id="darkModeToggle"> 暗いテーマを使用する
                    </label>
                </div>
                <div class="settings-item">
                    <label for="voiceSelect">👤 読み上げの声の種類</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="settings-item">
                    <label for="rateSlider">🏃 読み上げの速度: <span id="rateValue">1.0</span></label>
                    <input type="range" id="rateSlider" min="0.5" max="2" value="1" step="0.1">
                </div>
                <div class="settings-item">
                    <label for="pitchSlider">🎵 読み上げの高さ: <span id="pitchValue">1.0</span></label>
                    <input type="range" id="pitchSlider" min="0" max="2" value="1" step="0.1">
                </div>
            </div>

            <div class="section-title">📖 ユーザー辞書</div>
            <div class="dict-input-row">
                <input type="text" id="dictWrong" placeholder="誤認識される言葉">
                <input type="text" id="dictCorrect" placeholder="正しい言葉">
                <button id="addDictBtn">追加</button>
            </div>
            <ul id="dictList" class="dict-list"></ul>
        </div>
    </div>

    <script src="js/webrtc.js"></script>
    <script src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('ServiceWorker 登録成功:', reg.scope))
                    .catch((err) => console.log('ServiceWorker 登録失敗:', err));
            });
        }
    </script>
</body>
</html>
